<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>给儿童洁的专属开心卡片 💌</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=ZCOOL+KuaiLe&display=swap');
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: linear-gradient(135deg, #fdfbfb 0%, #ebedee 100%); font-family: 'ZCOOL KuaiLe', cursive, sans-serif; display: flex; justify-content: center; align-items: center; user-select: none; }
        #container { text-align: center; z-index: 10; position: relative; background: rgba(255, 255, 255, 0.9); padding: 40px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); max-width: 90%; transition: all 0.5s ease; }
        h1 { color: #333; margin-bottom: 20px; }
        p { color: #666; font-size: 1.2rem; margin-bottom: 30px; }
        .btn { background: linear-gradient(45deg, #ff9a9e 0%, #fad0c4 99%, #fad0c4 100%); border: none; padding: 15px 40px; color: white; font-size: 1.2rem; border-radius: 50px; cursor: pointer; box-shadow: 0 5px 15px rgba(255, 154, 158, 0.4); transition: transform 0.2s, box-shadow 0.2s; font-family: 'ZCOOL KuaiLe', cursive, sans-serif; }
        .btn:active { transform: scale(0.95); }
        .hidden { display: none; opacity: 0; }
        .fade-in { animation: fadeIn 1s forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; pointer-events: none; }
        .cloud-container { font-size: 100px; margin: 20px 0; animation: float 3s ease-in-out infinite; cursor: pointer; transition: transform 0.3s ease-out, opacity 0.3s; }
        @keyframes float { 0% { transform: translateY(0px); } 50% { transform: translateY(-10px); } 100% { transform: translateY(0px); } }
        .loading-bar { width: 100%; height: 10px; background: #eee; border-radius: 5px; margin: 20px 0; overflow: hidden; }
        .progress { width: 0%; height: 100%; background: #ff9a9e; transition: width 0.1s; }
    </style>
</head>
<body>
    <canvas id="fireworksCanvas"></canvas>
    <!-- 音频资源：使用你提供的真实烟花音效 -->
    <audio id="firework-source" src="firework_user.mp3?v=3" preload="auto"></audio>

    <div id="container">
        <div id="step1">
            <h1>检测到苏洁童鞋心情低落... 😟</h1>
            <p>正在启动「超级开心修复程序」...</p>
            <div class="loading-bar"><div class="progress" id="progressBar"></div></div>
            <p id="loadingText">注入可爱能量... 0%</p>
        </div>
        <div id="step2" class="hidden">
            <h1>嘿，儿童洁！👋</h1>
            <p>即使是仙女也会有烦心的时候，对吧？</p>
            <div class="cloud-container" id="cloud">☁️</div>
            <p>但这朵乌云看起来不想走...<br>除非你帮我一起把它吹跑！</p>
            <button class="btn" id="blowBtn">呼—— (点击吹气)</button>
        </div>
        <div id="step3" class="hidden">
            <h1>哇！你看！👀</h1>
            <p>乌云后面藏着一片星空 ✨</p>
            <p>还有一个专门为你准备的小魔法...</p>
            <button class="btn" id="fireBtn">点燃开心 🎆</button>
        </div>
        <div id="step4" class="hidden">
            <h1>开心点了吗？😊</h1>
            <p>所有的不开心都炸成烟花啦！</p>
            <p>—— 爱你的明哥 & mbot</p>
            <button class="btn" onclick="location.reload()">再看一次烟花</button>
        </div>
    </div>

    <script>
        // 🔥 真实烟花音效引擎 (使用用户提供的音频文件)
        function playBoom() {
            // 每次爆炸创建一个新的 Audio 对象
            const audio = new Audio('firework_user.mp3?v=3');
            
            // 随机化处理：音量大小随机 (0.3 - 1.0)
            const volume = 0.3 + Math.random() * 0.7;
            audio.volume = volume;

            // 随机化处理：播放速度随机 (0.8 - 1.2)
            audio.playbackRate = 0.8 + Math.random() * 0.4;
            
            // 尝试播放
            const playPromise = audio.play();
            if (playPromise !== undefined) {
                playPromise.catch(e => {
                    // console.log("Audio play failed", e);
                });
            }
        }

        // 成功/欢呼音效 (Web Audio API 合成，轻快的和弦)
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        const audioCtx = new AudioContext();
        function playCheer() {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const t = audioCtx.currentTime;
            [523.25, 659.25, 783.99, 1046.50].forEach((freq, i) => {
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.type = 'sine';
                osc.frequency.value = freq;
                gain.gain.setValueAtTime(0, t);
                gain.gain.linearRampToValueAtTime(0.2, t + 0.1 + i*0.05);
                gain.gain.exponentialRampToValueAtTime(0.01, t + 1.5);
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.start(t);
                osc.stop(t + 1.5);
            });
        }

        const step1 = document.getElementById('step1');
        const step2 = document.getElementById('step2');
        const step3 = document.getElementById('step3');
        const step4 = document.getElementById('step4');
        const container = document.getElementById('container');
        const canvas = document.getElementById('fireworksCanvas');
        const ctx = canvas.getContext('2d');

        // 阶段 1: 进度条
        let progress = 0;
        const progressBar = document.getElementById('progressBar');
        const loadingText = document.getElementById('loadingText');
        const timer = setInterval(() => {
            progress += Math.random() * 5;
            if(progress > 100) progress = 100;
            progressBar.style.width = progress + '%';
            loadingText.innerText = `注入可爱能量... ${Math.floor(progress)}%`;
            if(progress === 100) {
                clearInterval(timer);
                setTimeout(() => {
                    step1.classList.add('hidden');
                    step1.style.display = 'none';
                    step2.classList.remove('hidden');
                    step2.classList.add('fade-in');
                    step2.style.display = 'block';
                }, 500);
            }
        }, 100);

        // 阶段 2: 吹走乌云
        const blowBtn = document.getElementById('blowBtn');
        const cloud = document.getElementById('cloud');
        let blowCount = 0;
        blowBtn.addEventListener('click', () => {
            blowCount++;
            const moveX = blowCount * 60;
            const rotate = blowCount * 15;
            cloud.style.transform = `translateX(${moveX}px) rotate(${rotate}deg)`;
            cloud.style.opacity = 1 - (blowCount * 0.18);
            if(blowCount >= 5) {
                setTimeout(() => {
                    step2.classList.add('hidden');
                    step2.style.display = 'none';
                    step3.classList.remove('hidden');
                    step3.classList.add('fade-in');
                    step3.style.display = 'block';
                    document.body.style.background = '#000';
                    container.style.background = 'rgba(255, 255, 255, 0.1)';
                    container.style.color = '#fff';
                    document.querySelectorAll('h1, p').forEach(el => el.style.color = '#fff');
                    playCheer(); // 播放成功音效
                }, 800);
            }
        });

        // 阶段 3: 放烟花
        const fireBtn = document.getElementById('fireBtn');
        fireBtn.addEventListener('click', () => {
            step3.classList.add('hidden');
            step3.style.display = 'none';
            container.style.display = 'none';
            startFireworks();
            setTimeout(() => {
                container.style.display = 'block';
                step4.classList.remove('hidden');
                step4.classList.add('fade-in');
                step4.style.display = 'block';
            }, 8000);
        });

        // 烟花逻辑
        let fireworks = [];
        let particles = [];
        function resizeCanvas() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        function drawText() {
            if (particles.length > 0) {
                ctx.save();
                ctx.fillStyle = "rgba(255, 105, 180, " + (Math.random() * 0.5 + 0.5) + ")";
                ctx.font = "bold 80px 'ZCOOL KuaiLe'";
                ctx.textAlign = "center";
                ctx.shadowColor = "#ff69b4";
                ctx.shadowBlur = 20;
                ctx.fillText("宝贝，开心点！❤️", canvas.width/2, canvas.height/2);
                ctx.restore();
            }
        }

        class Particle {
            constructor(x, y, color) {
                this.x = x; this.y = y; this.color = color;
                const angle = Math.random() * Math.PI * 2;
                const speed = Math.random() * 5 + 2;
                this.vx = Math.cos(angle) * speed;
                this.vy = Math.sin(angle) * speed;
                this.alpha = 1;
                this.decay = Math.random() * 0.015 + 0.005;
            }
            update() { this.x += this.vx; this.y += this.vy; this.vy += 0.05; this.alpha -= this.decay; }
            draw() { ctx.save(); ctx.globalAlpha = this.alpha; ctx.fillStyle = this.color; ctx.beginPath(); ctx.arc(this.x, this.y, 2, 0, Math.PI * 2); ctx.fill(); ctx.restore(); }
        }

        class Firework {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = canvas.height;
                this.targetY = Math.random() * (canvas.height / 2);
                this.speed = Math.random() * 3 + 10;
                this.color = `hsl(${Math.random() * 360}, 100%, 50%)`;
                this.exploded = false;
            }
            update() { this.y -= this.speed; if (this.y <= this.targetY) { this.exploded = true; this.explode(); } }
            explode() { playBoom(); for (let i = 0; i < 100; i++) { particles.push(new Particle(this.x, this.y, this.color)); } }
            draw() { ctx.fillStyle = this.color; ctx.fillRect(this.x, this.y, 3, 10); }
        }

        function animate() {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.1)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            if (Math.random() < 0.05) { fireworks.push(new Firework()); }
            fireworks.forEach((fw, index) => { fw.update(); fw.draw(); if (fw.exploded) fireworks.splice(index, 1); });
            particles.forEach((p, index) => { p.update(); p.draw(); if (p.alpha <= 0) particles.splice(index, 1); });
            drawText();
            requestAnimationFrame(animate);
        }

        function startFireworks() { animate(); }
    </script>
</body>
</html>
